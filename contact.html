<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGF1HUB — Contact & Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{--color-bg:#f5f4f0;--color-surface:#ffffff;--color-border:#e0ddd8;--color-text:#1a1917;--color-text-muted:#6b6966;--color-text-faint:#a8a6a2;--color-red:#c0392b;}
[data-theme="dark"]{--color-bg:#0f0e0d;--color-surface:#1a1917;--color-border:#2e2d2b;--color-text:#e8e6e1;--color-text-muted:#888582;--color-text-faint:#4a4846;--color-red:#e74c3c;}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Barlow',sans-serif;background:var(--color-bg);color:var(--color-text);min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--color-border);background:var(--color-bg);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;color:var(--color-text)}
.nav-logo span{color:var(--color-red)}
.nav-back{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:var(--color-text-muted)}
.nav-back:hover{color:var(--color-red)}
.theme-toggle{background:none;border:1px solid var(--color-border);border-radius:6px;padding:.35rem .6rem;cursor:pointer;color:var(--color-text-muted);font-size:.85rem}
.hero{background:var(--color-surface);border-bottom:3px solid var(--color-red);padding:2.5rem 2rem 2rem;text-align:center}
.hero-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--color-red);margin-bottom:.5rem;font-weight:600}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1;text-transform:uppercase;letter-spacing:.02em}
.page{max-width:680px;margin:0 auto;padding:2.5rem 1.5rem}
.social-grid{display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem}
.social-card{display:flex;align-items:center;gap:1.25rem;background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;padding:1.25rem 1.5rem;text-decoration:none;color:var(--color-text);transition:border-color 200ms,transform 150ms;}
.social-card:hover{border-color:var(--color-red);transform:translateY(-1px)}
.social-icon{width:52px;height:52px;border-radius:12px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.social-icon img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.social-icon.form{background:var(--color-red);color:#fff;font-size:1.5rem}
.social-name{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.social-handle{font-size:.85rem;color:var(--color-text-muted);margin-top:.1rem}
.social-arrow{margin-left:auto;color:var(--color-text-faint);font-size:1.2rem}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--color-red);font-weight:700;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--color-border)}
footer{border-top:1px solid var(--color-border);text-align:center;padding:1.5rem;font-size:.75rem;color:var(--color-text-faint);letter-spacing:.05em;text-transform:uppercase}
@media(max-width:500px){nav{padding:.75rem 1rem}.page{padding:1.5rem 1rem}}
</style>
</head>
